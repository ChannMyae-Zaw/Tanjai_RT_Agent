<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TanjAI – Google Workspace Sales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0f0d;
      --surface: #111a16;
      --surface2: #172119;
      --border: rgba(100, 210, 140, 0.12);
      --accent: #4ade80;
      --accent2: #f97316;
      --accent-dim: rgba(74, 222, 128, 0.15);
      --text: #e8f5ee;
      --text-muted: #6b8a78;
      --user-bubble: #1a2d22;
      --ai-bubble: #12201a;
      --danger: #f87171;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(74, 222, 128, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 80%, rgba(249, 115, 22, 0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 15, 13, 0.8);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-ring {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      position: relative;
      animation: pulse-ring 3s ease-in-out infinite;
    }

    .logo-ring::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid rgba(74, 222, 128, 0.2);
      animation: pulse-ring 3s ease-in-out infinite 0.5s;
    }

    .logo-ring span {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 14px;
      color: var(--accent);
    }

    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.3); }
      50% { box-shadow: 0 0 0 6px rgba(74, 222, 128, 0); }
    }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.5px;
    }
    .brand-name span { color: var(--accent); }

    .brand-sub {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 100px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .status-dot.connected { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .status-dot.speaking { background: var(--accent2); box-shadow: 0 0 10px var(--accent2); animation: blink 0.6s ease-in-out infinite; }
    .status-dot.listening { background: var(--accent); box-shadow: 0 0 10px var(--accent); animation: blink 0.8s ease-in-out infinite; }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── Main layout ── */
    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 340px;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Chat area ── */
    .chat-area {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
      min-height: 0;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-height: 0;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message {
      display: flex;
      gap: 12px;
      animation: slide-up 0.3s ease-out;
      max-width: 82%;
    }

    @keyframes slide-up {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; align-self: flex-end; }
    .message.assistant { align-self: flex-start; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 12px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .avatar.ai {
      background: linear-gradient(135deg, var(--accent), #22c55e);
      color: #0a0f0d;
    }
    .avatar.user {
      background: linear-gradient(135deg, #374151, #1f2937);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .bubble {
      padding: 13px 17px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.65;
      font-weight: 300;
    }

    .message.assistant .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(100, 210, 140, 0.18);
      border-top-right-radius: 4px;
      color: var(--text);
    }

    .bubble.streaming::after {
      content: '▋';
      color: var(--accent);
      animation: blink 0.8s infinite;
    }

    .msg-meta {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 5px;
      padding: 0 4px;
      letter-spacing: 0.5px;
    }
    .message.user .msg-meta { text-align: right; }

    /* Typing indicator */
    .typing-indicator {
      display: none;
      gap: 12px;
      align-items: flex-start;
      animation: slide-up 0.3s ease-out;
    }
    .typing-indicator.visible { display: flex; }
    .typing-dots {
      display: flex;
      gap: 5px;
      padding: 14px 18px;
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-top-left-radius: 4px;
    }
    .typing-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.4;
      animation: typing-bounce 1.4s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing-bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input bar ── */
    .input-bar {
      padding: 20px 28px;
      border-top: 1px solid var(--border);
      background: rgba(10, 15, 13, 0.6);
      backdrop-filter: blur(8px);
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .text-input-wrap {
      flex: 1;
      position: relative;
    }

    #textInput {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
      min-height: 46px;
      max-height: 120px;
    }

    #textInput::placeholder { color: var(--text-muted); }
    #textInput:focus { border-color: rgba(74, 222, 128, 0.4); }

    .send-btn {
      width: 46px; height: 46px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #0a0f0d;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #6ee7a0; transform: scale(1.05); }
    .send-btn:active { transform: scale(0.97); }
    .send-btn svg { width: 18px; height: 18px; }

    /* ── Right panel ── */
    .right-panel {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      overflow: hidden;
    }

    /* Voice widget */
    .voice-widget {
      padding: 36px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      border-bottom: 1px solid var(--border);
    }

    .voice-label {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* Orb */
    .orb-wrap {
      position: relative;
      width: 120px; height: 120px;
      cursor: pointer;
    }

    .orb {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #2a4a35, #0f1f16);
      border: 2px solid rgba(74, 222, 128, 0.3);
      display: flex; align-items: center; justify-content: center;
      position: relative;
      transition: transform 0.2s, border-color 0.3s;
      z-index: 2;
    }

    .orb:hover { transform: scale(1.04); border-color: rgba(74, 222, 128, 0.6); }
    .orb:active { transform: scale(0.97); }

    .orb-icon { color: var(--accent); transition: color 0.3s; }

    .orb-icon svg { width: 36px; height: 36px; }

    /* Rings */
    .orb-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(74, 222, 128, 0.15);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .orb-ring-1 { width: 150px; height: 150px; }
    .orb-ring-2 { width: 180px; height: 180px; border-color: rgba(74, 222, 128, 0.07); }

    /* Active state */
    .orb-wrap.active .orb {
      border-color: var(--accent);
      box-shadow: 0 0 30px rgba(74, 222, 128, 0.25), 0 0 60px rgba(74, 222, 128, 0.1);
    }
    .orb-wrap.active .orb-ring-1 {
      animation: expand-ring 1.5s ease-out infinite;
    }
    .orb-wrap.active .orb-ring-2 {
      animation: expand-ring 1.5s ease-out infinite 0.5s;
    }

    .orb-wrap.speaking .orb {
      border-color: var(--accent2);
      box-shadow: 0 0 30px rgba(249, 115, 22, 0.25);
    }
    .orb-wrap.speaking .orb-icon { color: var(--accent2); }

    @keyframes expand-ring {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.3); opacity: 0; }
    }

    /* Waveform */
    .waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 32px;
      opacity: 0.3;
      transition: opacity 0.3s;
    }
    .waveform.active { opacity: 1; }

    .wave-bar {
      width: 3px;
      border-radius: 2px;
      background: var(--accent);
      height: 6px;
      transition: height 0.1s ease;
    }

    .waveform.active .wave-bar { animation: wave-anim 0.8s ease-in-out infinite; }
    .wave-bar:nth-child(1) { animation-delay: 0s; }
    .wave-bar:nth-child(2) { animation-delay: 0.1s; }
    .wave-bar:nth-child(3) { animation-delay: 0.2s; }
    .wave-bar:nth-child(4) { animation-delay: 0.15s; }
    .wave-bar:nth-child(5) { animation-delay: 0.05s; }
    .wave-bar:nth-child(6) { animation-delay: 0.25s; }
    .wave-bar:nth-child(7) { animation-delay: 0.1s; }
    .wave-bar:nth-child(8) { animation-delay: 0.2s; }
    .wave-bar:nth-child(9) { animation-delay: 0s; }

    @keyframes wave-anim {
      0%, 100% { height: 6px; }
      50% { height: 22px; }
    }

    .orb-hint {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
    }

    /* ── History ── */
    .history-section {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .history-section::-webkit-scrollbar { width: 3px; }
    .history-section::-webkit-scrollbar-thumb { background: var(--border); }

    .history-header {
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
      padding-left: 4px;
    }

    .history-item {
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 6px;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }

    .history-item.user-item {
      background: rgba(255,255,255,0.02);
    }
    .history-item.ai-item {
      background: rgba(74, 222, 128, 0.03);
      border-color: rgba(74, 222, 128, 0.06);
    }

    .history-role {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .history-item.ai-item .history-role { color: rgba(74, 222, 128, 0.5); }

    .history-text {
      font-size: 12px;
      color: rgba(232, 245, 238, 0.6);
      line-height: 1.5;
      font-weight: 300;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .empty-history {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      padding: 24px 0;
      line-height: 1.7;
    }

    /* Error toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1f1010;
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: var(--danger);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 100;
      transition: transform 0.3s ease;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .bubble.pending {
      opacity: 0.5;
      font-style: italic;
      color: var(--text-muted);
    }

    .bubble.pending {
      opacity: 0.5;
      font-style: italic;
      color: var(--text-muted);
    }

    /* Responsive */
    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
      .right-panel { height: 280px; border-right: none; border-top: 1px solid var(--border); }
      .history-section { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="logo-ring"><span>TJ</span></div>
    <div>
      <div class="brand-name">Tanjai <span>AI</span></div>
      <div class="brand-sub">Google Workspace Sales · Tangerine</div>
    </div>
  </div>
  <div class="status-pill">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connecting...</span>
  </div>
</header>

<main>
  <!-- Chat -->
  <section class="chat-area">
    <div class="messages" id="messages">
      <div class="message assistant">
        <div class="avatar ai">TJ</div>
        <div>
          <div class="bubble">สวัสดีครับ! ผม TanjAI ผู้ช่วยฝ่ายขาย Google Workspace จาก Tangerine 👋 วันนี้ผมช่วยอะไรคุณได้บ้างครับ?</div>
          <div class="msg-meta">TanjAI · just now</div>
        </div>
      </div>

      <div class="typing-indicator" id="typingIndicator">
        <div class="avatar ai">TJ</div>
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <div class="input-bar">
      <div class="text-input-wrap">
        <textarea id="textInput" rows="1" placeholder="Type a message... (or use voice above)"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" title="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </section>

  <!-- Right panel -->
  <aside class="right-panel">
    <div class="voice-widget">
      <div class="voice-label">Voice Mode</div>
      <div class="orb-wrap" id="orbWrap" onclick="toggleVoice()">
        <div class="orb-ring orb-ring-2"></div>
        <div class="orb-ring orb-ring-1"></div>
        <div class="orb">
          <div class="orb-icon" id="orbIcon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </div>
        </div>
      </div>
      <div class="waveform" id="waveform">
        <div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
      <div class="orb-hint" id="orbHint">Tap to start listening</div>
    </div>

    <div class="history-section">
      <div class="history-header">Conversation Log</div>
      <div id="historyList">
        <div class="empty-history">No messages yet.<br/>Start talking or type below.</div>
      </div>
    </div>
  </aside>
</main>

<div class="toast" id="toast"></div>

<script>
  // ── State ──
  let ws = null;
  let isListening = false;
  let audioContext = null;
  let mediaStream = null;
  let processor = null;
  let playbackContext = null;
  let audioQueue = [];
  let isPlaying = false;
  let activeSource = null;
  let streamingBubble = null;
  let streamingText = '';
  let pendingUserBubble = null;
  const conversationHistory = [];

  // ── WebSocket ──
  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.onopen = () => setStatus('connected', 'Connected');
    ws.onclose = () => { setStatus('', 'Disconnected'); setTimeout(connectWS, 3000); };
    ws.onerror = () => showToast('Connection error — retrying...');
    ws.onmessage = (e) => handleServerMsg(JSON.parse(e.data));
  }

  function handleServerMsg(msg) {
    switch(msg.type) {
      case 'session.created':
      case 'session.updated':
        setStatus('connected', 'Ready');
        break;

      case 'speech_started':
        setStatus('listening', 'Listening...');
        document.getElementById('waveform').classList.add('active');
        showTyping(false);
        // Barge-in: stop AI audio immediately
        audioQueue = [];
        isPlaying = false;
        if (activeSource) { try { activeSource.stop(); } catch(e){} activeSource = null; }
        if (streamingBubble) { streamingBubble.classList.remove('streaming'); streamingBubble = null; }
        setOrbSpeaking(false);
        // Placeholder bubble
        pendingUserBubble = addMessage('user', '...');
        pendingUserBubble.classList.add('pending');
        break;

      case 'speech_stopped':
        setStatus('connected', 'Processing...');
        document.getElementById('waveform').classList.remove('active');
        showTyping(true);
        break;

      case 'response_started':
        showTyping(false);
        streamingText = '';
        streamingBubble = addStreamingBubble();
        setOrbSpeaking(true);
        break;

      case 'audio_delta':
        enqueueAudio(msg.delta);
        break;

      case 'transcript_delta':
        if (streamingBubble && msg.delta) {
          streamingText += msg.delta;
          streamingBubble.textContent = streamingText;
        }
        break;

      case 'transcript_done':
        if (streamingBubble) { streamingBubble.classList.remove('streaming'); streamingBubble = null; }
        if (msg.transcript) addToHistory('assistant', msg.transcript);
        break;

      case 'user_transcript_done':
        if (msg.transcript) {
          if (pendingUserBubble) {
            pendingUserBubble.textContent = msg.transcript;
            pendingUserBubble.classList.remove('pending');
            pendingUserBubble = null;
          } else {
            addMessage('user', msg.transcript);
          }
          addToHistory('user', msg.transcript);
        } else if (pendingUserBubble) {
          pendingUserBubble.closest('.message').remove();
          pendingUserBubble = null;
        }
        break;

      case 'response_done':
        setStatus('connected', 'Ready');
        setOrbSpeaking(false);
        break;

      case 'error':
        showToast(msg.message || 'An error occurred');
        setStatus('connected', 'Ready');
        showTyping(false);
        setOrbSpeaking(false);
        break;
    }
  }

  // ── Audio playback ──
  function getPlaybackCtx() {
    if (!playbackContext || playbackContext.state === 'closed') {
      playbackContext = new AudioContext({ sampleRate: 24000 });
    }
    return playbackContext;
  }

  function enqueueAudio(base64) {
    const bytes = atob(base64);
    const buf = new Int16Array(bytes.length / 2);
    for (let i = 0; i < buf.length; i++) {
      buf[i] = (bytes.charCodeAt(i*2)) | (bytes.charCodeAt(i*2+1) << 8);
    }
    audioQueue.push(buf);
    if (!isPlaying) playNext();
  }

  function playNext() {
    if (audioQueue.length === 0) { isPlaying = false; return; }
    isPlaying = true;
    const pcm = audioQueue.shift();
    const ctx = getPlaybackCtx();
    const buf = ctx.createBuffer(1, pcm.length, 24000);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < pcm.length; i++) ch[i] = pcm[i] / 32768;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.onended = playNext;
    src.start();
    activeSource = src;
  }

  // ── Voice capture ──
  async function startListening() {
    try {
      audioContext = new AudioContext({ sampleRate: 24000 });
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const source = audioContext.createMediaStreamSource(mediaStream);
      processor = audioContext.createScriptProcessor(4096, 1, 1);
      processor.onaudioprocess = (e) => {
        if (!isListening || !ws || ws.readyState !== WebSocket.OPEN) return;
        const input = e.inputBuffer.getChannelData(0);
        const pcm = new Int16Array(input.length);
        for (let i = 0; i < input.length; i++) {
          pcm[i] = Math.max(-32768, Math.min(32767, input[i] * 32768));
        }
        const bytes = new Uint8Array(pcm.buffer);
        let binary = '';
        for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
        ws.send(JSON.stringify({ type: 'audio_chunk', audio: btoa(binary) }));
      };
      source.connect(processor);
      processor.connect(audioContext.destination);
      isListening = true;
      setOrbActive(true);
    } catch(err) {
      showToast('Microphone access denied');
      console.error(err);
    }
  }

  function stopListening() {
    isListening = false;
    if (processor) { processor.disconnect(); processor = null; }
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    if (audioContext) { audioContext.close(); audioContext = null; }
    setOrbActive(false);
    document.getElementById('waveform').classList.remove('active');
  }

  function toggleVoice() {
    if (isListening) { stopListening(); setStatus('connected', 'Ready'); }
    else { startListening(); setStatus('listening', 'Listening...'); }
  }

  // ── UI helpers ──
  function setStatus(cls, text) {
    document.getElementById('statusDot').className = 'status-dot' + (cls ? ' ' + cls : '');
    document.getElementById('statusText').textContent = text;
  }

  function setOrbActive(active) {
    document.getElementById('orbWrap').classList.toggle('active', active);
    document.getElementById('orbHint').textContent = active ? 'Tap to stop' : 'Tap to start listening';
  }

  function setOrbSpeaking(speaking) {
    document.getElementById('orbWrap').classList.toggle('speaking', speaking);
  }

  function showTyping(show) {
    document.getElementById('typingIndicator').classList.toggle('visible', show);
  }

  function addMessage(role, text) {
    const messages = document.getElementById('messages');
    const typing = document.getElementById('typingIndicator');
    const div = document.createElement('div');
    div.className = `message ${role === 'assistant' ? 'assistant' : 'user'}`;
    const avatar = document.createElement('div');
    avatar.className = `avatar ${role === 'assistant' ? 'ai' : 'user'}`;
    avatar.textContent = role === 'assistant' ? 'TJ' : 'You';
    const inner = document.createElement('div');
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = (role === 'assistant' ? 'TanjAI' : 'You') + ' · just now';
    inner.appendChild(bubble);
    inner.appendChild(meta);
    div.appendChild(avatar);
    div.appendChild(inner);
    messages.insertBefore(div, typing);
    return bubble;
  }

  function addStreamingBubble() {
    const messages = document.getElementById('messages');
    const typing = document.getElementById('typingIndicator');
    const div = document.createElement('div');
    div.className = 'message assistant';
    const avatar = document.createElement('div');
    avatar.className = 'avatar ai';
    avatar.textContent = 'TJ';
    const inner = document.createElement('div');
    const bubble = document.createElement('div');
    bubble.className = 'bubble streaming';
    bubble.textContent = '';
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = 'TanjAI · now';
    inner.appendChild(bubble);
    inner.appendChild(meta);
    div.appendChild(avatar);
    div.appendChild(inner);
    messages.insertBefore(div, typing);
    return bubble;
  }

  function addToHistory(role, text) {
    conversationHistory.push({ role, text, time: new Date() });
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    list.innerHTML = '';
    if (conversationHistory.length === 0) {
      list.innerHTML = '<div class="empty-history">No messages yet.<br/>Start talking or type below.</div>';
      return;
    }
    [...conversationHistory].reverse().forEach(item => {
      const div = document.createElement('div');
      div.className = `history-item ${item.role === 'user' ? 'user-item' : 'ai-item'}`;
      div.innerHTML = `
        <div class="history-role">${item.role === 'user' ? 'You' : 'TanjAI'}</div>
        <div class="history-text">${item.text}</div>
      `;
      list.appendChild(div);
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4000);
  }

  // ── Auto scroll ──
  const messagesEl = document.getElementById('messages');

  function isNearBottom() {
    return messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 120;
  }

  new MutationObserver(() => {
    if (isNearBottom()) messagesEl.scrollTop = messagesEl.scrollHeight;
  }).observe(messagesEl, { childList: true, subtree: true, characterData: true });

  // ── Text input ──
  const textInput = document.getElementById('textInput');
  const sendBtn = document.getElementById('sendBtn');

  textInput.addEventListener('input', () => {
    textInput.style.height = 'auto';
    textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px';
  });

  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
  });

  sendBtn.addEventListener('click', sendText);

  function sendText() {
    const text = textInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    textInput.value = '';
    textInput.style.height = 'auto';
    addMessage('user', text);
    addToHistory('user', text);
    showTyping(true);
    ws.send(JSON.stringify({ type: 'text_message', text }));
  }

  // ── Boot ──
  connectWS();
</script>
</body>
